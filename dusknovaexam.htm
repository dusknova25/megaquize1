<style>
  :root {
    --bg: #050505;
    --accent: #00FFFF;
    --card: #0d0d0d;
    --border: #1a1a1a;
    --text: #ffffff;
    --text-dim: #a0a0a0;
  }

  body { 
    font-family: 'Inter', 'Hind Siliguri', sans-serif; 
    background-color: var(--bg); color: var(--text); 
    margin: 0; padding: 0; -webkit-font-smoothing: antialiased;
  }

  /* Sticky Timer Header */
  .header-nav {
    position: fixed; top: 0; left: 0; width: 100%; height: 75px;
    background: rgba(5, 5, 5, 0.9); backdrop-filter: blur(15px);
    border-bottom: 1px solid var(--border); z-index: 1000;
    display: flex; align-items: center; justify-content: center;
  }

  .timer-box {
    padding: 10px 30px; border-radius: 50px; background: rgba(0, 255, 255, 0.05);
    border: 2px solid var(--accent); color: var(--accent);
    font-weight: 800; font-size: 24px; font-family: monospace;
  }

  .wrapper { max-width: 850px; margin: 120px auto 50px; padding: 20px; }

  /* Branding */
  .logo-container { text-align: center; margin-bottom: 35px; }
  .logo-top { width: 190px; height: auto; filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.2)); }

  .premium-card {
    background: var(--card); border: 1px solid var(--border);
    padding: 50px; border-radius: 20px; box-shadow: 0 40px 100px rgba(0,0,0,0.9);
  }

  h1 { 
    text-align: center; font-size: 40px; font-weight: 800; color: #ffffff; 
    margin: 0 0 45px; letter-spacing: 4px; text-transform: uppercase;
  }

  /* Form Grid */
  .form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 25px; }
  @media (max-width: 650px) { .form-grid { grid-template-columns: 1fr; } }

  .field { position: relative; margin-bottom: 25px; }
  .field label { 
    display: block; margin-bottom: 10px; font-size: 14px; font-weight: 700; 
    text-transform: uppercase; color: var(--accent); letter-spacing: 1.5px;
  }

  input, select {
    width: 100%; background: #000; border: 1px solid var(--border);
    padding: 16px; border-radius: 12px; color: #fff; font-size: 15px;
    transition: all 0.3s ease; box-sizing: border-box;
  }

  input:focus, select:focus { border-color: var(--accent); outline: none; background: #080808; }

  /* Quiz Style */
  .section-tag {
    display: inline-block; padding: 10px 25px; background: var(--accent);
    color: #000; font-weight: 800; font-size: 14px; border-radius: 6px;
    margin-top: 60px; text-transform: uppercase;
  }

  .q-wrapper { margin: 40px 0 80px; border-bottom: 1px solid #1a1a1a; padding-bottom: 45px; }
  .q-text { font-size: 26px; font-weight: 700; line-height: 1.6; margin-bottom: 30px; border-left: 6px solid var(--accent); padding-left: 25px; }
  
  .q-img { width: 100%; max-width: 500px; display: block; margin: 20px 0; border-radius: 12px; border: 1px solid var(--border); }

  .opt-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 600px) { .opt-grid { grid-template-columns: 1fr; } }

  .opt-btn {
    padding: 22px; background: #0a0a0a; border: 1px solid var(--border);
    border-radius: 14px; cursor: pointer; display: flex; align-items: center;
    justify-content: space-between; transition: 0.3s; font-weight: 600; font-size: 17px;
  }

  .opt-btn:hover { background: #151515; border-color: var(--accent); transform: translateX(8px); }
  .opt-btn input { order: 2; margin-left: 15px; accent-color: var(--accent); transform: scale(1.5); }

  .locked { opacity: 0.3; pointer-events: none; filter: grayscale(1); }

  .btn-submit {
    width: 100%; padding: 25px; background: var(--accent); color: #000;
    border: none; border-radius: 14px; font-size: 22px; font-weight: 800;
    cursor: pointer; text-transform: uppercase; letter-spacing: 3px;
    margin-top: 50px; transition: 0.4s;
  }

  .btn-submit:hover { background: #fff; box-shadow: 0 20px 60px rgba(0,255,255,0.4); }

  #successView { display: none; text-align: center; padding: 100px 20px; }
</style>

  let timer = 40 * 60;
  let interval;
  let startTime;

  window.startMegaQuiz = function() {
    const inputs = document.querySelectorAll(".req");
    let valid = true;
    inputs.forEach(i => {
      if(!i.value.trim()){ i.style.borderColor = "#ff4444"; valid = false; }
      else { i.style.borderColor = "var(--border)"; }
    });

    if(!valid) return alert("দয়া করে সবকটি ঘর পূরণ করুন!");

    document.getElementById("beep").play();
    document.getElementById("regPage").style.display = "none";
    document.getElementById("quizPage").style.display = "block";
    document.getElementById("quizHeader").style.display = "flex";
    
    renderQuestions();
    startTimer();
    startTime = Date.now();
  };

  function renderQuestions() {
    const container = document.getElementById("quizContent");
    let html = "";
    megaData.forEach((s, sI) => {
      html += `<div class="section-tag">${s.section}</div>`;
      s.questions.forEach((q, qI) => {
        const imagePart = q.img ? `<img src="${q.img}" class="q-img">` : "";
        html += `
          <div class="q-wrapper">
            <div class="q-text">প্রশ্ন ${qI + 1}: ${q.q}</div>
            ${imagePart}
            <div class="opt-grid" id="lock-grp-${sI}-${qI}">
              ${q.options.map((o, i) => `
                <label class="opt-btn">
                  <span>${o}</span>
                  <input type="radio" name="s${sI}q${qI}" value="${i}" onclick="lockOption(${sI}, ${qI})">
                </label>`).join('')}
            </div>
          </div>
        `;
      });
    });
    container.innerHTML = html;
    MathJax.typeset();
  }

  window.lockOption = function(sI, qI) {
    document.getElementById(`lock-grp-${sI}-${qI}`).classList.add("locked");
  };

  function startTimer() {
    interval = setInterval(() => {
      let m = Math.floor(timer / 60);
      let s = timer % 60;
      document.getElementById("clock").textContent = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
      if (timer <= 0) { clearInterval(interval); submitMegaQuiz(true); }
      timer--;
    }, 1000);
  }

  window.submitMegaQuiz = function(auto = false) {
    if(!auto && !confirm("আপনি কি কুইজটি জমা দিতে চান?")) return;
    
    const endTime = Date.now();
    const timeTaken = Math.floor((endTime - startTime) / 1000);
    
    clearInterval(interval);
    document.getElementById("finish").play();
    document.getElementById("finalSub").disabled = true;

    let marks = 0;
    megaData.forEach((s, sI) => {
      s.questions.forEach((q, qI) => {
        const sel = document.querySelector(`input[name="s${sI}q${qI}"]:checked`);
        if(sel && parseInt(sel.value) === q.correct) marks += 1;
      });
    });

    const payload = {
      user_info: {
        name: document.getElementById("name").value,
        phone: document.getElementById("phone").value,
        college: document.getElementById("college").value,
        batch: document.getElementById("batch").value,
        email: document.getElementById("gmail").value,
        fb_profile: document.getElementById("fb").value,
        is_dusknova_student: document.getElementById("isStudent").value,
        discovery_source: document.getElementById("knowSource").value
      },
      score: marks,
      time_taken_seconds: timeTaken,
      submitted_at: new Date().toLocaleString()
    };

    push(ref(db, 'mega_quiz_responses/'), payload)
      .then(() => {
        document.getElementById("quizPage").style.display = "none";
        document.getElementById("quizHeader").style.display = "none";
        document.getElementById("successView").style.display = "block";
        window.scrollTo(0,0);
      })
      .catch((error) => {
        console.error("Firebase Error:", error);
        alert("ডাটা জমা দিতে সমস্যা হয়েছে। পুনরায় চেষ্টা করুন।");
        document.getElementById("finalSub").disabled = false;
      });
  };
</script>
